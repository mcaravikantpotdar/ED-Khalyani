<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster Staff Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #login-container { max-width: 400px; margin-top: 100px; }
    .hidden { display: none !important; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #timer-badge { position: fixed; top: 10px; right: 10px; z-index: 1000; }
  </style>
</head>
<body>

  <div id="login-screen" class="container">
    <div id="login-container" class="mx-auto">
      <div class="card p-4">
        <h3 class="text-center mb-4">Cluster Manager</h3>
        <div class="mb-3">
          <label class="form-label">School UDISE Code</label>
          <input type="text" id="udise-input" class="form-control" placeholder="Enter 11-digit code">
        </div>
        <div class="mb-3">
          <label class="form-label">Security PIN</label>
          <input type="password" id="pin-input" class="form-control" placeholder="Enter PIN">
        </div>
        <button id="login-btn" onclick="window.handleLogin()" class="btn btn-primary w-100">Unlock System</button>
        <div id="login-error" class="text-danger mt-3 small text-center hidden"></div>
      </div>
    </div>
  </div>

  <div id="app-screen" class="container-fluid py-4 hidden">
    <span id="timer-badge" class="badge bg-danger p-2">Session: <span id="timer-count">05:00</span></span>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h2 id="display-school-name" class="mb-0">School Name</h2>
        <small class="text-muted">UDISE: <span id="display-udise"></span> | Role: <span id="display-role"></span></small>
      </div>
      <button onclick="window.handleLogout()" class="btn btn-outline-danger">Logout</button>
    </div>

    <div class="row mb-4">
       <div class="col-md-3">
         <div class="card p-3 text-center bg-white">
           <h6 class="text-muted">Staff Registered</h6>
           <h2 id="stat-total-staff">0</h2>
         </div>
       </div>
    </div>

    <div class="card p-3">
      <div class="d-flex justify-content-between mb-3">
        <h5>Staff Records</h5>
        <button class="btn btn-success" onclick="window.showAddStaffModal()">+ Add New Staff</button>
      </div>
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr id="table-headers">
              </tr>
          </thead>
          <tbody id="staff-table-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 justify-content-center align-items-center d-flex hidden">
    <div class="spinner-border text-light" role="status"></div>
  </div>

  <script>
    // App State
    window.session = {
      udise: null,
      schoolName: null,
      role: null,
      timer: 300 // 5 minutes in seconds
    };
    
    let timerInterval;

    // LOGIN LOGIC
    window.handleLogin = function() {
      const udise = document.getElementById('udise-input').value;
      const pin = document.getElementById('pin-input').value;
      
      if(!udise || !pin) return;
      
      window.showLoading(true);
      google.script.run
        .withSuccessHandler(window.onAuthResult)
        .authenticateSchool(udise, pin);
    };

    window.onAuthResult = function(response) {
      window.showLoading(false);
      if(response.success) {
        window.session.udise = response.udise;
        window.session.schoolName = response.schoolName;
        window.session.role = response.role;
        
        document.getElementById('display-school-name').innerText = response.schoolName;
        document.getElementById('display-udise').innerText = response.udise;
        document.getElementById('display-role').innerText = response.role;
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        
        window.startSecurityTimer();
        // Next: Load Initial Data
      } else {
        const err = document.getElementById('login-error');
        err.innerText = response.message;
        err.classList.remove('hidden');
      }
    };

    // SECURITY TIMER (5-MINUTE LOCK)
    window.startSecurityTimer = function() {
      clearInterval(timerInterval);
      window.session.timer = 300;
      
      timerInterval = setInterval(() => {
        window.session.timer--;
        let mins = Math.floor(window.session.timer / 60);
        let secs = window.session.timer % 60;
        document.getElementById('timer-count').innerText = 
          `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        
        if(window.session.timer <= 0) {
          window.handleLogout();
          alert("Session expired for security. Please login again.");
        }
      }, 1000);
    };

    window.handleLogout = function() {
      clearInterval(timerInterval);
      window.session = { udise: null, schoolName: null, role: null, timer: 300 };
      document.getElementById('app-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('udise-input').value = "";
      document.getElementById('pin-input').value = "";
    };

    window.showLoading = function(show) {
      const overlay = document.getElementById('loading-overlay');
      show ? overlay.classList.remove('hidden') : overlay.classList.add('hidden');
    };

    window.showAddStaffModal = function() {
      alert("Form rendering logic is next on our roadmap!");
    };

  </script>
</body>
</html>
